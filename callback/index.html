<!DOCTYPE html>
<html>
<head>
  <title>Tesla Auth Callback</title>
  <style>
    body { font-family: monospace; padding: 40px; background: #111; color: #eee; }
    #code { font-size: 14px; background: #222; padding: 16px; border-radius: 6px; word-break: break-all; margin: 16px 0; }
    button { padding: 10px 20px; background: #e82127; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Tesla Authorization</h2>
  <div id="status"></div>
  <div id="code"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      document.getElementById('status').innerText = 'Authorization code received. Copy it into your terminal:';
      document.getElementById('code').innerText = code;
      const btn = document.createElement('button');
      btn.innerText = 'Copy';
      btn.onclick = () => navigator.clipboard.writeText(code).then(() => btn.innerText = 'Copied!');
      document.getElementById('code').after(btn);
    } else {
      document.getElementById('status').innerText = 'No code found in URL. Something went wrong.';
    }
  </script>
</body>
</html>
